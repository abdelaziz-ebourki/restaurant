# 1. Database Connection
spring.datasource.url=jdbc:h2:mem:restaurantdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 2. H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. Initialization Logic (The most important part)
# Use 'none' if you have a schema.sql file; use 'update' if you don't.
spring.jpa.hibernate.ddl-auto=none
# Forces data.sql to wait until the table is ready
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# 4. Debugging
spring.jpa.show-sql=true